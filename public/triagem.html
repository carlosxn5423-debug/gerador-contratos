<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Triagem de Candidatos — Laquila</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:        #1c1a16;
      --gold:        #c9a84c;
      --gold-light:  #e8c96d;
      --gold-bg:     #faf5e4;
      --gold-border: #e8d9a0;
      --green:       #3cb96a;
      --green-bg:    #f0fdf4;
      --green-border:#bbf7d0;
      --yellow-bg:   #fefce8;
      --yellow-border:#fde68a;
      --red-bg:      #fef2f2;
      --red-border:  #fecaca;
      --text:        #1a1814;
      --text-2:      #6b6357;
      --text-3:      #a89d8e;
      --border:      #e8e3da;
      --bg:          #f5f3ee;
      --card:        #ffffff;
      --radius:      14px;
      --radius-sm:   9px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--dark);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 54px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-icon { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; }
    .brand-name { font-size: .85rem; font-weight: 800; color: #fff; letter-spacing: .07em; text-transform: uppercase; }
    .nav { display: flex; gap: 4px; }
    .nav a {
      padding: 6px 14px; border-radius: 6px;
      font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.55);
      text-decoration: none; transition: color .15s, background .15s;
    }
    .nav a:hover { color: #fff; background: rgba(255,255,255,.07); }
    .nav a.active { color: var(--gold); background: rgba(201,168,76,.1); }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }

    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }
    .page-title { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; }
    .page-sub   { font-size: .82rem; color: var(--text-2); margin-top: 4px; }

    /* ── Form selector ── */
    .form-selector {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .form-tab {
      padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
      font-size: .78rem; font-weight: 600; color: var(--text-2);
      background: var(--card); cursor: pointer; transition: all .15s;
    }
    .form-tab:hover { border-color: var(--gold); color: var(--text); }
    .form-tab.active {
      background: var(--dark); color: var(--gold);
      border-color: var(--dark);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .stat-pill.green  { background: var(--green-bg);  color: #15803d; border: 1px solid var(--green-border); }
    .stat-pill.yellow { background: var(--yellow-bg); color: #92400e; border: 1px solid var(--yellow-border); }
    .stat-pill.red    { background: var(--red-bg);    color: #b91c1c; border: 1px solid var(--red-border); }
    .stat-pill.gray   { background: #f5f5f4;          color: var(--text-2); border: 1px solid var(--border); }

    /* ── Search / filter ── */
    .toolbar {
      display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%; padding: 8px 12px 8px 34px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: .83rem; color: var(--text);
      background: var(--card); outline: none;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); font-size: .85rem; pointer-events: none;
    }
    .filter-select {
      padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: .83rem; color: var(--text);
      background: var(--card); outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--gold); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 16px; text-align: left;
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-3);
      background: #faf9f7; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid #f0ede8; transition: background .1s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf9f7; }
    td { padding: 12px 16px; font-size: .83rem; vertical-align: middle; }

    /* ── Score badge ── */
    .score-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: .85rem; font-weight: 800;
    }
    .score-badge.green  { background: var(--green-bg);  color: #15803d; border: 2px solid var(--green-border); }
    .score-badge.yellow { background: var(--yellow-bg); color: #92400e; border: 2px solid var(--yellow-border); }
    .score-badge.red    { background: var(--red-bg);    color: #b91c1c; border: 2px solid var(--red-border); }

    /* ── Decision badge ── */
    .decision-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: .72rem; font-weight: 600; white-space: nowrap;
    }
    .decision-badge.green  { background: var(--green-bg);  color: #15803d; border: 1px solid var(--green-border); }
    .decision-badge.yellow { background: var(--yellow-bg); color: #92400e; border: 1px solid var(--yellow-border); }
    .decision-badge.red    { background: var(--red-bg);    color: #b91c1c; border: 1px solid var(--red-border); }

    .video-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--gold); font-size: .78rem; font-weight: 600;
      text-decoration: none;
    }
    .video-link:hover { text-decoration: underline; }
    .no-video { color: var(--text-3); font-size: .75rem; }

    /* ── Breakdown tooltip ── */
    .breakdown { font-size: .72rem; color: var(--text-3); margin-top: 2px; }

    /* ── Loading / empty states ── */
    .state-box {
      padding: 56px 32px; text-align: center;
      color: var(--text-3); font-size: .88rem;
    }
    .state-box .icon { font-size: 2rem; margin-bottom: 12px; }
    .state-box p { margin-top: 6px; font-size: .8rem; color: var(--text-3); }

    /* ── Detail modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card); border-radius: var(--radius);
      max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); font-size: 1.1rem;
    }
    .modal-close:hover { background: var(--bg); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-meta { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .modal-section { margin-bottom: 18px; }
    .modal-section-title {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--text-3); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .modal-section-title::before {
      content: ''; width: 3px; height: 11px;
      background: linear-gradient(to bottom, var(--gold), var(--gold-light));
      border-radius: 2px; flex-shrink: 0;
    }
    .qa-item { margin-bottom: 12px; }
    .qa-q { font-size: .75rem; font-weight: 600; color: var(--text-2); margin-bottom: 3px; }
    .qa-a { font-size: .83rem; color: var(--text); line-height: 1.55; }
    .score-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #f0ede8; font-size: .82rem;
    }
    .score-row:last-child { border-bottom: none; }
    .score-row .label { color: var(--text-2); }
    .score-row .val { font-weight: 700; }
    /* ── IA analysis ── */
    .ia-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      background: var(--dark); color: var(--gold);
      font-family: inherit; font-size: .8rem; font-weight: 700;
      border: none; cursor: pointer; transition: background .15s;
    }
    .ia-btn:hover { background: #2a271f; }
    .ia-btn:disabled { background: #d1cec7; color: #a89d8e; cursor: not-allowed; }
    .ia-result {
      margin-top: 14px; padding: 14px 16px;
      background: var(--gold-bg); border: 1px solid var(--gold-border);
      border-radius: var(--radius-sm);
    }
    .ia-resumo { font-size: .84rem; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
    .ia-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .ia-col { flex: 1; min-width: 140px; }
    .ia-col-title { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 5px; }
    .ia-tag {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: .72rem; font-weight: 600; margin: 2px 2px 2px 0;
    }
    .ia-tag.green  { background: var(--green-bg);  color: #15803d; }
    .ia-tag.red    { background: var(--red-bg);    color: #b91c1c; }
    .ia-recomendacao { font-size: .8rem; color: var(--text-2); font-style: italic; margin-top: 8px; line-height: 1.5; }
    .ia-score-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ia-score-num { font-size: 1.3rem; font-weight: 800; color: var(--dark); }
    .ia-fit-badge {
      padding: 2px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700;
    }
    .ia-fit-alto   { background: var(--green-bg);  color: #15803d; border: 1px solid var(--green-border); }
    .ia-fit-medio  { background: var(--yellow-bg); color: #92400e; border: 1px solid var(--yellow-border); }
    .ia-fit-baixo  { background: var(--red-bg);    color: #b91c1c; border: 1px solid var(--red-border); }

    .decision-selector { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .decision-btn {
      padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border);
      font-family: inherit; font-size: .75rem; font-weight: 600;
      cursor: pointer; background: var(--bg); color: var(--text-2);
      transition: all .15s;
    }
    .decision-btn:hover { border-color: var(--gold); color: var(--text); }
    .decision-btn.active-green  { background: var(--green-bg);  color: #15803d; border-color: var(--green-border); }
    .decision-btn.active-yellow { background: var(--yellow-bg); color: #92400e; border-color: var(--yellow-border); }
    .decision-btn.active-red    { background: var(--red-bg);    color: #b91c1c; border-color: var(--red-border); }

    @media (max-width: 700px) {
      .page { padding: 20px 16px 48px; }
      .topbar { padding: 0 16px; }
      thead th:nth-child(4), td:nth-child(4),
      thead th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">
    <div class="brand-icon">📄</div>
    <span class="brand-name">Laquila</span>
  </a>
  <nav class="nav">
    <a href="/">Contratos</a>
    <a href="/triagem" class="active">Triagem</a>
  </nav>
</div>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Triagem de Candidatos</div>
      <div class="page-sub">Score automático por formulário · clique em um candidato para ver detalhes</div>
    </div>
  </div>

  <div class="form-selector" id="formTabs">
    <div class="state-box"><div class="icon">⏳</div>Carregando formulários...</div>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none"></div>

  <div class="toolbar" style="display:none" id="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar candidato..." />
    </div>
    <select class="filter-select" id="filterDecision">
      <option value="">Todas as decisões</option>
      <option value="Agendar reunião">✅ Agendar reunião</option>
      <option value="Revisar">🟡 Revisar</option>
      <option value="Não prosseguir">❌ Não prosseguir</option>
    </select>
  </div>

  <div class="table-wrap" id="tableWrap">
    <div class="state-box">
      <div class="icon">👆</div>
      Selecione um formulário acima para ver os candidatos
    </div>
  </div>
</div>

<!-- Modal de detalhes -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalName">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  let allCandidates = []
  let currentDecisions = {}

  // ── Carrega formulários ──────────────────────────────────────────
  async function loadForms() {
    const res  = await fetch('/triagem/forms')
    const forms = await res.json()
    const wrap = document.getElementById('formTabs')
    wrap.innerHTML = forms.map(f =>
      `<div class="form-tab" data-id="${f.id}" onclick="selectForm('${f.id}', this)">${f.title}</div>`
    ).join('')
  }

  // ── Seleciona formulário ─────────────────────────────────────────
  async function selectForm(formId, el) {
    document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'))
    el.classList.add('active')

    document.getElementById('tableWrap').innerHTML =
      '<div class="state-box"><div class="icon">⏳</div>Buscando candidatos e calculando scores...</div>'
    document.getElementById('statsBar').style.display = 'none'
    document.getElementById('toolbar').style.display = 'none'

    try {
      const res  = await fetch(`/triagem/candidates/${formId}`)
      const data = await res.json()
      if (!res.ok) throw new Error(data.error)

      allCandidates = data
      // restaura decisões manuais salvas localmente
      allCandidates.forEach(c => {
        if (currentDecisions[c.response_id]) c.decision = currentDecisions[c.response_id]
      })

      renderStats()
      renderTable()
      document.getElementById('statsBar').style.display = 'flex'
      document.getElementById('toolbar').style.display  = 'flex'

      document.getElementById('searchInput').oninput   = renderTable
      document.getElementById('filterDecision').onchange = renderTable
    } catch (err) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="state-box"><div class="icon">❌</div>${err.message}<p>Verifique se TYPEFORM_TOKEN está configurado no .env</p></div>`
    }
  }

  // ── Stats ────────────────────────────────────────────────────────
  function renderStats() {
    const total   = allCandidates.length
    const green   = allCandidates.filter(c => c.decision.color === 'green').length
    const yellow  = allCandidates.filter(c => c.decision.color === 'yellow').length
    const red     = allCandidates.filter(c => c.decision.color === 'red').length
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-pill gray">${total} candidatos</div>
      <div class="stat-pill green">✅ ${green} agendar</div>
      <div class="stat-pill yellow">🟡 ${yellow} revisar</div>
      <div class="stat-pill red">❌ ${red} não prosseguir</div>
    `
  }

  // ── Tabela ───────────────────────────────────────────────────────
  function renderTable() {
    const q      = document.getElementById('searchInput').value.toLowerCase()
    const filter = document.getElementById('filterDecision').value

    const filtered = allCandidates.filter(c => {
      const matchQ = !q || c.name.toLowerCase().includes(q) ||
                     (c.contact.email || '').toLowerCase().includes(q)
      const matchD = !filter || c.decision.label === filter
      return matchQ && matchD
    })

    if (!filtered.length) {
      document.getElementById('tableWrap').innerHTML =
        '<div class="state-box"><div class="icon">🔍</div>Nenhum candidato encontrado</div>'
      return
    }

    const rows = filtered.map(c => {
      const bd = c.score_breakdown
      const videoHtml = c.video_url
        ? `<a class="video-link" href="${escHtml(c.video_url)}" target="_blank" rel="noopener">▶ Ver vídeo</a>`
        : `<span class="no-video">Sem vídeo</span>`
      return `
        <tr onclick="openModal('${c.response_id}')">
          <td>
            <div style="font-weight:600">${escHtml(c.name)}</div>
            <div style="font-size:.72rem;color:var(--text-3)">${escHtml(c.contact.email || '—')}</div>
          </td>
          <td>
            <div class="score-badge ${c.decision.color}">${c.score}</div>
            <div class="breakdown">S:${bd.salary} E:${bd.experience} Q:${bd.quality} V:${bd.video}</div>
          </td>
          <td><span class="decision-badge ${c.decision.color}">${decisionIcon(c.decision.color)} ${c.decision.label}</span></td>
          <td style="color:var(--text-2)">${escHtml(c.salary_raw || '—')}</td>
          <td>${videoHtml}</td>
        </tr>`
    }).join('')

    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Candidato</th>
            <th>Score</th>
            <th>Decisão</th>
            <th>Salário pretendido</th>
            <th>Vídeo</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`
  }

  // ── Modal ────────────────────────────────────────────────────────
  function openModal(responseId) {
    const c = allCandidates.find(x => x.response_id === responseId)
    if (!c) return
    document.getElementById('modalName').textContent = c.name
    const bd = c.score_breakdown
    const videoHtml = c.video_url
      ? `<a href="${escHtml(c.video_url)}" target="_blank" rel="noopener" style="color:var(--gold);font-weight:600">▶ Assistir vídeo</a>`
      : `<span style="color:var(--text-3)">Sem vídeo</span>`

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-meta">
        <span class="decision-badge ${c.decision.color}">${decisionIcon(c.decision.color)} ${c.decision.label}</span>
        <span class="stat-pill gray" style="padding:3px 10px;font-size:.72rem">${new Date(c.submitted_at).toLocaleDateString('pt-BR')}</span>
        ${c.contact.email ? `<span style="font-size:.78rem;color:var(--text-2)">${escHtml(c.contact.email)}</span>` : ''}
        ${c.contact.phone ? `<span style="font-size:.78rem;color:var(--text-2)">${escHtml(c.contact.phone)}</span>` : ''}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Score — ${c.score}/100</div>
        <div class="score-row"><span class="label">💰 Salário pretendido</span><span class="val">${bd.salary}/30</span></div>
        <div class="score-row"><span class="label">💼 Experiência na área</span><span class="val">${bd.experience}/25</span></div>
        <div class="score-row"><span class="label">✍️ Qualidade das respostas</span><span class="val">${bd.quality}/25</span></div>
        <div class="score-row"><span class="label">🎬 Vídeo</span><span class="val">${bd.video}/20</span></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Vídeo de apresentação</div>
        ${videoHtml}
        ${c.salary_raw ? `<div style="margin-top:8px;font-size:.82rem;color:var(--text-2)">Salário pretendido: <strong>${escHtml(c.salary_raw)}</strong></div>` : ''}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Respostas</div>
        ${(c.text_answers || []).filter(a => a.answer).map(a => `
          <div class="qa-item">
            <div class="qa-q">${escHtml(a.question)}</div>
            <div class="qa-a">${escHtml(a.answer)}</div>
          </div>`).join('')}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Análise com IA</div>
        <button class="ia-btn" id="iaBtn" onclick="requestAiAnalysis('${c.response_id}')">
          ✦ Analisar com IA
        </button>
        <div id="iaResult"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Alterar decisão</div>
        <div class="decision-selector">
          <button class="decision-btn ${c.decision.label === 'Agendar reunião' ? 'active-green' : ''}"
            onclick="updateDecision('${c.response_id}', 'Agendar reunião', 'green', this)">✅ Agendar reunião</button>
          <button class="decision-btn ${c.decision.label === 'Revisar' ? 'active-yellow' : ''}"
            onclick="updateDecision('${c.response_id}', 'Revisar', 'yellow', this)">🟡 Revisar</button>
          <button class="decision-btn ${c.decision.label === 'Não prosseguir' ? 'active-red' : ''}"
            onclick="updateDecision('${c.response_id}', 'Não prosseguir', 'red', this)">❌ Não prosseguir</button>
        </div>
      </div>
    `
    document.getElementById('modalOverlay').classList.remove('hidden')
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.add('hidden')
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal()
  })

  async function updateDecision(responseId, status, color, btn) {
    const c = allCandidates.find(x => x.response_id === responseId)
    if (!c) return

    try {
      await fetch(`/triagem/candidate/${responseId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      })
    } catch (_) {}

    c.decision = { label: status, color }
    currentDecisions[responseId] = { label: status, color }

    // Atualiza botões no modal
    btn.closest('.decision-selector').querySelectorAll('.decision-btn').forEach(b => {
      b.className = 'decision-btn'
    })
    btn.classList.add(`active-${color}`)

    // Atualiza badge no topo do modal
    const badge = document.querySelector('#modalBody .decision-badge')
    if (badge) {
      badge.className = `decision-badge ${color}`
      badge.textContent = `${decisionIcon(color)} ${status}`
    }

    renderStats()
    renderTable()
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function decisionIcon(color) {
    return color === 'green' ? '✅' : color === 'yellow' ? '🟡' : '❌'
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Análise IA ───────────────────────────────────────────────────
  async function requestAiAnalysis(responseId) {
    const c   = allCandidates.find(x => x.response_id === responseId)
    const btn = document.getElementById('iaBtn')
    const box = document.getElementById('iaResult')
    if (!c || !btn) return

    btn.disabled = true
    btn.textContent = '⏳ Analisando...'
    box.innerHTML = ''

    try {
      const res  = await fetch(`/triagem/candidate/${responseId}/analyze`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ candidate: c }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error)

      const fitClass = data.fit_cargo === 'Alto' ? 'ia-fit-alto' : data.fit_cargo === 'Médio' ? 'ia-fit-medio' : 'ia-fit-baixo'
      const fortes   = (data.pontos_fortes  || []).map(p => `<span class="ia-tag green">${escHtml(p)}</span>`).join('')
      const atencao  = (data.pontos_atencao || []).map(p => `<span class="ia-tag red">${escHtml(p)}</span>`).join('')

      box.innerHTML = `
        <div class="ia-result">
          <div class="ia-score-wrap">
            <span class="ia-score-num">${data.score_ia}/10</span>
            <span class="ia-fit-badge ${fitClass}">Fit ${data.fit_cargo}</span>
          </div>
          <div class="ia-resumo">${escHtml(data.resumo)}</div>
          <div class="ia-row">
            <div class="ia-col">
              <div class="ia-col-title">Pontos fortes</div>
              ${fortes || '<span style="color:var(--text-3);font-size:.75rem">—</span>'}
            </div>
            <div class="ia-col">
              <div class="ia-col-title">Atenção</div>
              ${atencao || '<span style="color:var(--text-3);font-size:.75rem">—</span>'}
            </div>
          </div>
          <div class="ia-recomendacao">💬 ${escHtml(data.recomendacao)}</div>
        </div>`

      btn.textContent = '✦ Reanalisar'
      btn.disabled = false
    } catch (err) {
      box.innerHTML = `<div style="color:#b91c1c;font-size:.8rem;margin-top:8px">Erro: ${escHtml(err.message)}</div>`
      btn.textContent = '✦ Tentar novamente'
      btn.disabled = false
    }
  }

  // ── Init ─────────────────────────────────────────────────────────
  loadForms()
</script>
</body>
</html>
