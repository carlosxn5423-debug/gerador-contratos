name: triagem-candidatos
version: "1.0.0"
description: "Squad para triagem automática de candidatos via Typeform com scoring e gestão de decisões"
domain: hr-screening
author: Laquila Marketing

agents:
  - id: triagem-analyst
    file: agents/triagem-analyst.md
    role: Analisa respostas do Typeform e calcula score dos candidatos

tasks:
  - name: score-candidate
    file: tasks/score-candidate.md
    agent: triagem-analyst
  - name: fetch-candidates
    file: tasks/fetch-candidates.md
    agent: triagem-analyst

config:
  - scoring-rules.yaml

integrations:
  - typeform
  - supabase

stack:
  backend: node/express
  frontend: vanilla-js
  database: supabase

